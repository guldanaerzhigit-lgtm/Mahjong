<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahjong Blast 3.0</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
}

#topbar {
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    font-size: 14px;
}

#game {
    display: grid;
    gap: 6px;
    justify-content: center;
    margin: 15px auto;
}

.tile {
    background: white;
    color: black;
    font-size: clamp(22px, 5vw, 32px);
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    aspect-ratio: 1/1;
    cursor: pointer;
    transition: 0.3s;
    transform: scale(1);
}

.tile.locked {
    background: #999;
    cursor: not-allowed;
}

.tile.selected {
    background: gold;
}

.tile.fade {
    animation: fadeOut 0.4s forwards;
}

@keyframes fadeOut {
    to {
        opacity: 0;
        transform: scale(0);
    }
}
</style>
</head>
<body>

<h1>🀄 Mahjong Blast 3.0</h1>

<div id="topbar">
    <div>Уровень: <span id="level"></span></div>
    <div>Очки: <span id="score"></span></div>
    <div>Комбо: <span id="combo"></span></div>
    <div>Время: <span id="time"></span></div>
</div>

<div id="game"></div>

<script>
const tilesSet = [
"🀇","🀈","🀉","🀊","🀋","🀌","🀍",
"🀙","🀚","🀛","🀜","🀝","🀞","🀟",
"🀐","🀑","🀒","🀓","🀔","🀕","🀖"
];

let level = 1;
let gridSize;
let tileTypes;
let board = [];
let firstTile = null;
let score = 0;
let combo = 0;
let timeLeft;
let timer;

function initLevel() {

    clearInterval(timer);

    gridSize = 6;
    tileTypes = 6 + Math.floor(level / 10);

    score = 0;
    combo = 0;
    timeLeft = 60;

    generateSmartBoard();

    document.getElementById("level").innerText = level;

    renderBoard();
    updateUI();

    timer = setInterval(() => {
        timeLeft--;
        updateUI();
        if (timeLeft <= 0) alert("⏰ Время вышло!");
    }, 1000);
}

function generateSmartBoard() {

    let total = gridSize * gridSize;
    board = [];

    let values = [];

    for (let i = 0; i < total / 2; i++) {
        let type = i % tileTypes;
        values.push(type);
        values.push(type);
    }

    values.sort(() => Math.random() - 0.5);

    for (let i = 0; i < total; i++) {
        board.push({ value: values[i], active: true });
    }
}

function isFree(index) {

    if (!board[index].active) return false;

    let row = Math.floor(index / gridSize);
    let col = index % gridSize;

    let left = col > 0 ? board[index - 1].active : false;
    let right = col < gridSize - 1 ? board[index + 1].active : false;

    return !(left && right);
}

function renderBoard() {

    const game = document.getElementById("game");
    game.innerHTML = "";
    game.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

    board.forEach((tile, index) => {

        const div = document.createElement("div");
        div.className = "tile";

        if (!tile.active) {
            div.style.visibility = "hidden";
        } else {

            if (!isFree(index)) {
                div.classList.add("locked");
            }

            div.innerText = tilesSet[tile.value];

            div.onclick = () => selectTile(index, div);
        }

        game.appendChild(div);
    });
}

function selectTile(index, element) {

    if (!isFree(index)) return;

    if (!firstTile) {
        firstTile = index;
        element.classList.add("selected");
    } else {

        if (firstTile === index) return;

        if (board[firstTile].value === board[index].value) {

            let firstEl = document.getElementsByClassName("tile")[firstTile];
            let secondEl = element;

            firstEl.classList.add("fade");
            secondEl.classList.add("fade");

            setTimeout(() => {
                board[firstTile].active = false;
                board[index].active = false;

                score += 100 * (combo + 1);
                combo++;

                firstTile = null;

                renderBoard();
                updateUI();

                if (checkWin()) {
                    level++;
                    setTimeout(initLevel, 1000);
                }

            }, 400);

        } else {
            combo = 0;
            firstTile = null;
        }

        updateUI();
    }
}

function checkWin() {
    return board.every(t => !t.active);
}

function updateUI() {
    document.getElementById("score").innerText = score;
    document.getElementById("combo").innerText = combo;
    document.getElementById("time").innerText = timeLeft;
}

initLevel();
</script>

</body>
</html>
