<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahjong 4.0</title>

<style>
body {
    margin:0;
    background:#0f172a;
    font-family:Arial;
    text-align:center;
    color:white;
}

#game {
    position:relative;
    width:100%;
    height:80vh;
    perspective:1200px;
}

.tile {
    position:absolute;
    width:60px;
    height:80px;
    background:white;
    color:black;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    cursor:pointer;
    transition: transform .3s, opacity .3s;
    box-shadow: 0 10px 15px rgba(0,0,0,.4);
}

.tile.free {
    box-shadow:0 0 15px gold;
}

.tile.selected {
    transform: scale(1.1);
}

.tile.removing {
    transform: translateY(-100px) rotateY(180deg);
    opacity:0;
}
</style>
</head>
<body>

<h1>🀄 Mahjong Solitaire 4.0</h1>
<div id="game"></div>

<script>

const symbols = [
"🀇","🀈","🀉","🀊","🀋","🀌","🀍",
"🀙","🀚","🀛","🀜","🀝","🀞","🀟",
"🀐","🀑","🀒","🀓","🀔","🀕","🀖"
];

const layout = [
 // z0 (нижний слой)
 [{x:0,y:0},{x:1,y:0},{x:2,y:0},{x:3,y:0},{x:4,y:0},{x:5,y:0},
  {x:0,y:1},{x:5,y:1},
  {x:0,y:2},{x:5,y:2},
  {x:0,y:3},{x:1,y:3},{x:2,y:3},{x:3,y:3},{x:4,y:3},{x:5,y:3}],
 // z1
 [{x:1,y:1},{x:2,y:1},{x:3,y:1},{x:4,y:1},
  {x:1,y:2},{x:2,y:2},{x:3,y:2},{x:4,y:2}],
 // z2
 [{x:2,y:1},{x:3,y:1},
  {x:2,y:2},{x:3,y:2}]
];

let tiles = [];
let first = null;

function generateSolvableBoard() {

    let positions = [];

    layout.forEach((layer,z)=>{
        layer.forEach(p=>{
            positions.push({x:p.x,y:p.y,z:z});
        });
    });

    let pool = [];
    for(let i=0;i<positions.length/2;i++){
        let type = i % symbols.length;
        pool.push(type,type);
    }

    pool.sort(()=>Math.random()-0.5);

    tiles = positions.map((pos,i)=>({
        ...pos,
        value: pool[i],
        active:true
    }));
}

function isFree(tile) {

    if(!tile.active) return false;

    // проверка сверху
    let top = tiles.find(t=>t.active && t.z===tile.z+1 && t.x===tile.x && t.y===tile.y);
    if(top) return false;

    // проверка слева/справа
    let left = tiles.find(t=>t.active && t.z===tile.z && t.x===tile.x-1 && t.y===tile.y);
    let right = tiles.find(t=>t.active && t.z===tile.z && t.x===tile.x+1 && t.y===tile.y);

    return !(left && right);
}

function render() {

    const game = document.getElementById("game");
    game.innerHTML="";

    tiles.forEach((tile,i)=>{

        if(!tile.active) return;

        const div = document.createElement("div");
        div.className="tile";

        div.style.left = tile.x*65 + tile.z*10 + "px";
        div.style.top = tile.y*85 - tile.z*10 + "px";
        div.style.zIndex = tile.z*10 + tile.y;

        div.innerText = symbols[tile.value];

        if(isFree(tile)) div.classList.add("free");

        div.onclick = ()=>selectTile(tile,div);

        game.appendChild(div);
    });
}

function selectTile(tile,element){

    if(!isFree(tile)) return;

    if(!first){
        first = tile;
        element.classList.add("selected");
    } else {

        if(first===tile) return;

        if(first.value===tile.value){

            let el1 = [...document.getElementsByClassName("tile")]
                .find(el=>el.innerText===symbols[first.value]);

            element.classList.add("removing");
            el1.classList.add("removing");

            setTimeout(()=>{
                first.active=false;
                tile.active=false;
                first=null;
                render();
            },300);

        } else {
            first=null;
        }
    }
}

generateSolvableBoard();
render();

</script>
</body>
</html>
