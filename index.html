<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahjong Blast 2.0</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
}

h1 { margin: 10px 0; }

#topbar {
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    font-size: 14px;
}

#game {
    display: grid;
    gap: 6px;
    justify-content: center;
    margin: 15px auto;
}

.tile {
    background: white;
    color: black;
    font-size: clamp(20px, 5vw, 32px);
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    aspect-ratio: 1/1;
    cursor: pointer;
    transition: 0.2s;
}

.tile.selected {
    background: gold;
}

.tile.hidden {
    visibility: hidden;
}

button {
    padding: 8px 14px;
    margin: 8px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>
<body>

<h1>🀄 Mahjong Blast</h1>

<div id="topbar">
    <div>Уровень: <span id="level"></span></div>
    <div>Очки: <span id="score"></span></div>
    <div>Комбо: <span id="combo"></span></div>
    <div>Время: <span id="time"></span> сек</div>
    <div>⭐ <span id="stars"></span></div>
</div>

<div id="game"></div>
<button onclick="shuffleBoard()">Перемешать</button>

<script>
const mahjongTiles = [
"🀇","🀈","🀉","🀊","🀋","🀌","🀍",
"🀙","🀚","🀛","🀜","🀝","🀞","🀟",
"🀐","🀑","🀒","🀓","🀔","🀕","🀖"
];

let level = 1;
let gridSize;
let tileTypes;
let board = [];
let firstTile = null;

let score = 0;
let combo = 0;
let timeLeft;
let timerInterval;

function saveProgress() {
    localStorage.setItem("mahjong_level", level);
}

function loadProgress() {
    const saved = localStorage.getItem("mahjong_level");
    if (saved) level = parseInt(saved);
}

function initLevel() {

    clearInterval(timerInterval);

    gridSize = 4 + Math.floor(level / 10);
    if (gridSize % 2 !== 0) gridSize++;

    tileTypes = 4 + Math.floor(level / 15);

    score = 0;
    combo = 0;

    timeLeft = 30 + level * 2;

    document.getElementById("level").innerText = level;
    updateUI();

    generateBoard();
    renderBoard();

    timerInterval = setInterval(() => {
        timeLeft--;
        updateUI();
        if (timeLeft <= 0) loseLevel();
    }, 1000);
}

function generateBoard() {
    let total = gridSize * gridSize;
    board = [];
    let values = [];

    for (let i = 0; i < total / 2; i++) {
        let type = Math.floor(Math.random() * tileTypes);
        values.push(type);
        values.push(type);
    }

    values.sort(() => Math.random() - 0.5);

    for (let i = 0; i < total; i++) {
        board.push({ value: values[i], active: true });
    }

    if (!hasMoves()) shuffleBoard();
}

function renderBoard() {
    const game = document.getElementById("game");
    game.innerHTML = "";
    game.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

    board.forEach((tile, index) => {
        const div = document.createElement("div");
        div.className = "tile";

        if (!tile.active) div.classList.add("hidden");

        div.innerText = mahjongTiles[tile.value];

        div.onclick = () => selectTile(index, div);

        game.appendChild(div);
    });
}

function selectTile(index, element) {

    if (!board[index].active) return;

    if (!firstTile) {
        firstTile = index;
        element.classList.add("selected");
    } else {

        if (firstTile === index) return;

        if (board[firstTile].value === board[index].value) {

            board[firstTile].active = false;
            board[index].active = false;

            combo++;
            score += 100 * combo;
        } else {
            combo = 0;
        }

        firstTile = null;

        if (!hasMoves()) shuffleBoard();
        if (checkWin()) winLevel();

        renderBoard();
        updateUI();
    }
}

function hasMoves() {
    let active = board.filter(t => t.active);
    let map = {};
    for (let t of active) {
        map[t.value] = (map[t.value] || 0) + 1;
    }
    return Object.values(map).some(c => c >= 2);
}

function shuffleBoard() {
    let activeValues = board
        .filter(t => t.active)
        .map(t => t.value)
        .sort(() => Math.random() - 0.5);

    let i = 0;
    for (let t of board) {
        if (t.active) {
            t.value = activeValues[i];
            i++;
        }
    }
    renderBoard();
}

function checkWin() {
    return board.every(t => !t.active);
}

function winLevel() {
    clearInterval(timerInterval);

    let starCount = 1;
    if (timeLeft > 15) starCount = 3;
    else if (timeLeft > 5) starCount = 2;

    document.getElementById("stars").innerText = "⭐".repeat(starCount);

    level++;
    if (level > 100) {
        alert("🎉 Ты прошёл все 100 уровней!");
        level = 1;
    }

    saveProgress();

    setTimeout(initLevel, 2000);
}

function loseLevel() {
    clearInterval(timerInterval);
    alert("⏰ Время вышло!");
    initLevel();
}

function updateUI() {
    document.getElementById("score").innerText = score;
    document.getElementById("combo").innerText = combo;
    document.getElementById("time").innerText = timeLeft;
}

loadProgress();
initLevel();
</script>
</body>
</html>
